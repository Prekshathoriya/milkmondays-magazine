<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collection — Milk Mondays</title>
    <!-- Ensure your Google Fonts links from magazine.html are here too -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Playball&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> 
    <style>
        /* Pinterest-style Masonry Grid */
        .lookbook-grid {
            column-count: 3;
            column-gap: 28px;
            margin-top: 40px;
        }

        @media (max-width: 1024px) { .lookbook-grid { column-count: 2; } }
        @media (max-width: 768px) { .lookbook-grid { column-count: 1; } }

        .look-item {
            break-inside: avoid;
            margin-bottom: 28px;
            background: var(--white);
            border: 1px solid var(--border);
            padding: 8px;
            transition: transform 0.3s var(--ease);
            display: flex;
            flex-direction: column;
        }
        
        .look-item:hover { transform: translateY(-4px); }
        
        .look-img-wrap {
            overflow: hidden;
            background: #eee;
            aspect-ratio: 4/5; 
            margin-bottom: 12px;
        }

        .look-img-wrap img {
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            transition: transform 0.5s var(--ease);
        }

        .look-item:hover img { transform: scale(1.03); }

        .look-footer {
            padding: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .look-link {
            font-family: var(--sans);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--black);
            border-bottom: 1px solid var(--black);
            padding-bottom: 2px;
        }

        .action-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .share-btn, .save-btn, .page-share-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s var(--ease);
        }

        .share-btn:hover, .save-btn:hover, .page-share-btn:hover {
            opacity: 0.6;
        }

        .page-share-btn {
            font-family: var(--sans);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-left: 8px;
        }

        /* Minimal Toast Notification */
        .share-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(40px);
            background: var(--black);
            color: var(--white);
            font-family: var(--sans);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 10px 20px;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
            z-index: 1000;
        }

        .share-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="logo-wrap">
            <a href="index.html" class="brand">
                <span class="m">Milk</span> <span class="n">Mondays</span>
            </a>
        </div>
        <nav class="nav">
            <a href="magazine.html" class="nav-btn">Magazine</a>
            <a href="lookbook.html" class="nav-btn active">The Collection</a>
            <button class="page-share-btn" id="pageShareBtn" title="Share Collection">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px;"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                Share
            </button>
        </nav>
    </header>

    <main class="mag-wrap">
        <div class="divider">
            <div class="divider-label">Curated Selects</div>
            <div class="divider-line"></div>
        </div>

        <div class="lookbook-grid" id="lookbookGrid">
            <!-- Items injected by JS -->
        </div>
    </main>

    <div class="share-toast" id="shareToast">Link copied to clipboard</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('mm_gate_passed') !== 'true') {
                window.location.href = 'gate-form.html?redirect=lookbook.html';
                return;
            }

            const grid = document.getElementById('lookbookGrid');
            const toast = document.getElementById('shareToast');

            // Global helper to show minimal notification
            function showToast(message) {
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // Entire Page Share Logic
            document.getElementById('pageShareBtn').addEventListener('click', function() {
                if (navigator.share) {
                    navigator.share({
                        title: 'The Collection — Milk Mondays',
                        url: window.location.href
                    }).catch(err => console.log(err));
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    showToast('Collection link copied');
                }
            });

            fetch('lookbook.json')
                .then(res => res.json())
                .then(data => {
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'look-item';
                        card.innerHTML = `
                            <div class="look-img-wrap">
                                <img src="${item.imageUrl}" alt="Look" loading="lazy">
                            </div>
                            <div class="look-footer">
                                <a href="${item.links[0].url}" class="look-link" target="_blank">Shop Item</a>
                                <div class="action-group">
                                    <button class="share-btn" data-shop-url="${item.links[0].url}" title="Share Item">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                    </button>
                                    <button class="save-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });

                    // Event Delegation for Individual Item Share Button
                    grid.addEventListener('click', function(e) {
                        const shareBtn = e.target.closest('.share-btn');
                        if (shareBtn) {
                            const targetUrl = shareBtn.getAttribute('data-shop-url');
                            if (navigator.share) {
                                navigator.share({
                                    title: 'Shop this look on Milk Mondays',
                                    url: targetUrl
                                }).catch(err => console.log(err));
                            } else {
                                navigator.clipboard.writeText(targetUrl);
                                showToast('Item link copied');
                            }
                        }
                    });
                })
                .catch(err => console.error('Error loading lookbook:', err));
        });
    </script>
</body>
</html>
