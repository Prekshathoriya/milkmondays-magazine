<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lookbook — Milk Mondays</title>
    <link rel="stylesheet" href="styles.css"> 
    <style>
        /* Pinterest-style Masonry Grid Integration */
        .lookbook-grid {
            column-count: 3;
            column-gap: 28px;
            margin-top: 40px;
        }

        @media (max-width: 1024px) { .lookbook-grid { column-count: 2; } }
        @media (max-width: 600px) { .lookbook-grid { column-count: 1; } }

        .look-item {
            break-inside: avoid;
            margin-bottom: 28px;
            background: var(--white);
            border: 1px solid var(--border);
            padding: 8px;
            transition: transform 0.3s var(--ease);
        }
        
        .look-item:hover { transform: translateY(-4px); }
        
        .look-img-wrap {
    overflow: hidden;
    background: var(--white); /* Changed to white to match your theme */
    margin-bottom: 12px;
    line-height: 0; /* Removes extra space under images */
}

.look-img-wrap img {
    width: 100%;
    display: block;
    /* 'contain' will show the whole image without stretching */
    /* 'cover' will fill the space but may crop; 'contain' ensures no stretching */
    object-fit: contain; 
    transition: transform 0.5s var(--ease);
}

        .look-item:hover img { transform: scale(1.03); }

        .look-footer {
            padding: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .look-link {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--black);
            border-bottom: 1px solid var(--black);
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="logo-wrap">
            <a href="index.html" class="brand"><span class="m">M</span>ilk <span class="n">Mondays</span></a>
        </div>
        <nav class="nav">
            <a href="magazine.html" class="nav-btn">Magazine</a>
            <a href="lookbook.html" class="nav-btn active">Lookbook</a>
        </nav>
    </header>

    <main class="mag-wrap">
        <div class="divider">
    <div class="divider-label">Curated Selects</div>
    <div class="divider-line"></div>
</div>

        <div class="lookbook-grid" id="lookbookGrid">
            </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check auth gate
            if (localStorage.getItem('mm_gate_passed') !== 'true') {
                window.location.href = 'gate-form.html?redirect=lookbook.html';
                return;
            }

            const grid = document.getElementById('lookbookGrid');

            fetch('lookbook.json')
                .then(res => res.json())
                .then(data => {
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'look-item';
                        card.innerHTML = `
                            <div class="look-img-wrap">
                                <img src="${item.imageUrl}" alt="Look">
                            </div>
                            <div class="look-footer">
                                <a href="${item.links[0].url}" class="look-link" target="_blank">Shop Item</a>
                                <button class="save-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                })
                .catch(err => console.error('Error loading lookbook:', err));
        });
    </script>
</body>
</html>
