<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Mondays — Before You Read</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;1,400&family=Playball&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --pink:  #F3C1C6;
            --black: #121212;
            --cream: #FAF9F6;
            --grey:  #8E8E8E;
            --red:   #c0392b;
            --serif: 'Playfair Display', Georgia, serif;
            --sans:  'DM Sans', sans-serif;
            --logo:  'Playball', cursive;
        }
        body {
            background: var(--cream);
            font-family: var(--sans);
            color: var(--black);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .grain {
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }
        .bar {
            background: var(--black);
            color: #fff;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-align: center;
            padding: 9px 20px;
            text-transform: uppercase;
        }
        .site-header {
            text-align: center;
            padding: 36px 20px 20px;
            border-bottom: 1px solid var(--black);
        }
        .brand {
            font-family: var(--logo);
            font-size: 46px;
            line-height: 1;
            text-decoration: none;
            color: inherit;
        }
        .brand .m { color: var(--pink); margin-right: -4px; }
        .brand .n {
            font-family: var(--serif);
            font-size: 40px;
            font-style: italic;
            color: var(--black);
        }
        .wrap {
            max-width: 480px;
            margin: 60px auto 80px;
            padding: 0 20px;
        }
        .card {
            border: 1px solid var(--black);
            padding: 44px 40px;
            background: var(--cream);
        }
        .card-title {
            font-family: var(--serif);
            font-size: 30px;
            font-weight: 400;
            font-style: italic;
            text-align: center;
            margin-bottom: 14px;
        }
        .card-intro {
            text-align: center;
            color: var(--grey);
            font-size: 13px;
            margin-bottom: 34px;
            line-height: 1.7;
        }
        .field { margin-bottom: 26px; }
        label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="text"],
        input[type="email"] {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--black);
            background: transparent;
            padding: 10px 0;
            font-family: var(--sans);
            font-size: 14px;
            outline: none;
            color: var(--black);
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="text"]::placeholder,
        input[type="email"]::placeholder { color: #bbb; }
        input[type="text"]:focus,
        input[type="email"]:focus { border-bottom-color: var(--pink); }
        .error-msg {
            font-size: 11px;
            color: var(--red);
            margin-bottom: 14px;
            display: none;
        }
        .error-msg.show { display: block; }
        .submit-btn {
            display: block;
            width: 100%;
            background: none;
            border: 1px solid var(--black);
            padding: 14px;
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            color: var(--black);
        }
        .submit-btn:hover { background: var(--black); color: #fff; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .site-footer-sm {
            text-align: center;
            padding: 28px 20px 40px;
            border-top: 1px solid #E5E5E5;
            font-size: 10px;
            color: var(--grey);
        }
    </style>
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="bar">A collection of everyday things. If it looks good, it belongs here.</div>

    <header class="site-header">
        <a href="magazine.html" class="brand"><span class="m">Milk</span> <span class="n">Mondays</span></a>
    </header>

    <div class="wrap">
        <div class="card">
            <h1 class="card-title">Before you read…</h1>
            <p class="card-intro">
                Just your name and email<br>
                a little hello before the good part.
            </p>

            <form id="mm-gate-form" method="POST" action="https://docs.google.com/forms/d/e/1FAIpQLSeEjjDtWM9naUilBhodwqCCHetUhm2HPzBOgMMvE6PnbWOm4g/formResponse" target="hidden-iframe">
                <div class="field">
                    <label for="input-name">Your name *</label>
                    <input type="text" id="input-name" name="entry.1112062655" placeholder="What should we call you?" autocomplete="given-name" required>
                </div>

                <div class="field">
                    <label for="input-email">Email address *</label>
                    <input type="email" id="input-email" name="entry.71996981" placeholder="your@email.com" autocomplete="email" required>
                </div>

                <p class="error-msg" id="error-msg" role="alert">Please fill in your name and email address.</p>

                <button type="submit" class="submit-btn" id="submit-btn">Unlock Content →</button>
            </form>

            <iframe id="hidden-iframe" name="hidden-iframe" style="display:none;"></iframe>
        </div>
    </div>

    <footer class="site-footer-sm">&copy; 2026 Milk Mondays. All rights reserved.</footer>

    <script>
    (function() {
        'use strict';

        var form = document.getElementById('mm-gate-form');
        var nameInput = document.getElementById('input-name');
        var emailInput = document.getElementById('input-email');
        var errorMsg = document.getElementById('error-msg');
        var submitBtn = document.getElementById('submit-btn');
        var iframe = document.getElementById('hidden-iframe');
        
        var isSubmitting = false;

        function getRedirectDest() {
            var params = new URLSearchParams(window.location.search);
            var dest = params.get('redirect');
            if (!dest || !/^(https?:\/\/|\/|[^:]+\.html)/.test(dest)) {
                dest = 'magazine.html';
            }
            return dest;
        }

        // Fired after data reaches Google Forms
        iframe.addEventListener('load', function() {
            if (!isSubmitting) return; 

            try {
                localStorage.setItem('mm_gate_passed', 'true');
                localStorage.setItem('mm_user_name', nameInput.value.trim());
                localStorage.setItem('mm_user_email', emailInput.value.trim());
            } catch(e) {}

            window.location.href = getRedirectDest();
        });

        form.addEventListener('submit', function(e) {
            var name = nameInput.value.trim();
            var email = emailInput.value.trim();

            errorMsg.classList.remove('show');

            if (!name || !email) {
                e.preventDefault();
                errorMsg.textContent = 'Please fill in your name and email address.';
                errorMsg.classList.add('show');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                e.preventDefault();
                errorMsg.textContent = 'Please enter a valid email address.';
                errorMsg.classList.add('show');
                return;
            }

            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Unlocking…';
        });

        [nameInput, emailInput].forEach(function(inp) {
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if(form.reportValidity ? form.reportValidity() : true) {
                        form.requestSubmit ? form.requestSubmit() : form.submit();
                    }
                }
            });
        });
    })();
    </script>
</body>
</html>
