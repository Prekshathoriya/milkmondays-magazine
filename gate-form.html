<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Milk Mondays</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="page-wrapper">
        <div class="step-container">
            <div id="gate-form-panel" class="step-panel active">
                <h2 class="form-title">Before you read...</h2>
                <div class="form-card">
                    <form id="access-form">
                        <div class="field-group">
                            <input type="text" id="user-name" class="field-input" placeholder="Name" required>
                        </div>
                        <div class="field-group">
                            <input type="email" id="user-email" class="field-input" placeholder="Email Address" required>
                        </div>
                        <button type="submit" class="primary-btn">Unlock Content</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('access-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('user-email').value;
            const name = document.getElementById('user-name').value;
            
            // Save to localStorage
            localStorage.setItem('mm_gate_passed', 'true');
            localStorage.setItem('mm_user_email', email);
            localStorage.setItem('mm_user_name', name);
            
            // Redirect back to intended article or index
            const redirect = localStorage.getItem('mm_redirect_path') || 'index.html';
            window.location.href = redirect;
        });
    </script>
</body>
</html>
